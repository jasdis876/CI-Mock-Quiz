  { id:2, type:"MCQ", domain:"STI Syndromes", question:"Which of the following is NOT an advantage of syndromic management of STIs?", options:["Immediate treatment without laboratory delay","Simplified flow of patient care","Identification of asymptomatic infections","Reduction of disease transmission"], answer:2, explanation:"Syndromic management does NOT identify asymptomatic infections – that is a limitation." },

  { id:4, type:"MCQ", domain:"STI Syndromes", question:"What is the most important step in managing a patient with genital ulcers?", options:["Apply topical antibiotics only","Identify and treat sexual partners","Delay treatment until laboratory confirmation","Prescribe antifungal therapy"], answer:1, explanation:"Partner notification and treatment break transmission and prevent reinfection." },

  { id:8, type:"MCQ", domain:"Hepatitis B", question:"Which serological pattern indicates a chronic Hepatitis B carrier state?", options:["HBsAg +, anti-HBc +, anti-HBs –","HBsAg –, anti-HBs +, anti-HBc +","HBsAg –, anti-HBs +, anti-HBc –","HBsAg +, anti-HBc –, anti-HBs –"], answer:0, explanation:"HBsAg positive for >6 months with anti-HBc and no anti-HBs = chronic carrier." },

  { id:11, type:"MCQ", domain:"Syphilis", question:"A patient with secondary syphilis typically presents with which finding?", options:["Painless indurated ulcer","Maculopapular rash on palms and soles","Painful ulcers with exudate","Itchy vesicular lesions"], answer:1, explanation:"Secondary syphilis often causes a symmetrical rash involving palms and soles." },
  { id:12, type:"MCQ", domain:"Hepatitis B", question:"A newborn of an HBsAg‑positive mother should receive:", options:["Hepatitis B vaccine only","HBIG only","Both HBIG and vaccine within 24 hours","No intervention"], answer:2, explanation:"HBIG + first vaccine dose within 12–24 hours prevents >90% of chronic infections." },
  { id:13, type:"MCQ", domain:"STI Syndromes", question:"The presence of 'clue cells' on vaginal microscopy is diagnostic of which condition?", options:["Gonorrhoea","Bacterial vaginosis","Candidiasis","Trichomoniasis"], answer:1, explanation:"Clue cells = epithelial cells covered with coccobacilli, pathognomonic for BV." },

  { id:15, type:"MCQ", domain:"STI Syndromes", question:"A man has multiple painful genital ulcers and tender, suppurative inguinal lymph nodes (buboes). Which organism is most likely responsible?", options:["Treponema pallidum","Haemophilus ducreyi","Klebsiella granulomatis","Herpes simplex virus"], answer:1, explanation:"Painful ulcers with painful suppurative nodes are characteristic of chancroid (H. ducreyi)." },

  { id:20, type:"MCQ", domain:"STI Syndromes", question:"A 32-year-old man has a vesicular rash on the glans penis that ulcerates and recurs every few months. What is the most likely diagnosis?", options:["Genital herpes","Primary syphilis","Chancroid","Granuloma inguinale"], answer:0, explanation:"Recurrent vesicular lesions that ulcerate are typical of genital herpes simplex virus infection." },
  { id:21, type:"MCQ", domain:"STI Syndromes", question:"In the Jamaican syndromic algorithm, what is the recommended treatment for a woman presenting with vaginal discharge syndrome?", options:["Ceftriaxone + Doxycycline + Metronidazole","Azithromycin + Gentamicin + Clotrimazole","Doxycycline + Metronidazole only","Amoxicillin + Fluconazole"], answer:0, explanation:"Ceftriaxone, doxycycline, and metronidazole cover gonorrhoea, chlamydia, and BV/trichomoniasis." },
  { id:22, type:"MCQ", domain:"STI Syndromes", question:"A 25-year-old woman has vaginal discharge and pelvic pain. On speculum examination, the cervix bleeds easily on contact. Which organism is most likely?", options:["Candida albicans","Neisseria gonorrhoeae","Trichomonas vaginalis","Gardnerella vaginalis"], answer:1, explanation:"Easy friability (contact bleeding) and mucopurulent cervicitis are commonly caused by gonorrhoea or chlamydia." },
  { id:23, type:"MCQ", domain:"STI Syndromes", question:"A woman treated for vaginal discharge two weeks ago returns with lower abdominal pain, fever, and purulent discharge. What is the most likely diagnosis?", options:["Candidiasis","Pelvic inflammatory disease (PID)","Bacterial vaginosis","Urinary tract infection"], answer:1, explanation:"Lower abdominal pain, fever and purulent discharge suggest ascending infection (PID)." },
  { id:24, type:"MCQ", domain:"STI Syndromes", question:"What is the most serious long‑term complication of pelvic inflammatory disease (PID)?", options:["Cervical erosion","Tubal infertility","Vaginal fistulae","Chronic candidiasis"], answer:1, explanation:"PID causes scarring and adhesions of the fallopian tubes, leading to tubal factor infertility and ectopic pregnancy." },

  { id:26, type:"MCQ", domain:"STI Syndromes", question:"In the Jamaican syndromic algorithm, what initial treatment is given for genital ulcer disease (GUD) when the cause is not yet known?", options:["Benzathine penicillin G + Erythromycin","Ceftriaxone + Acyclovir + Azithromycin","Benzathine penicillin G + Ceftriaxone + Acyclovir","Doxycycline + Metronidazole"], answer:2, explanation:"The GUD algorithm in Jamaica treats for syphilis (BPG), chancroid (ceftriaxone/azithromycin) and herpes (acyclovir) pending diagnosis." },
  { id:27, type:"MCQ", domain:"STI Syndromes", question:"A 28-year-old diabetic woman reports recurrent thick, white vaginal discharge and intense itching. What is the most likely cause?", options:["Trichomoniasis","Candidiasis","Bacterial vaginosis","Chlamydia"], answer:1, explanation:"Thick, curdy discharge with pruritus, especially in a diabetic, is classic for vulvovaginal candidiasis." },
  { id:28, type:"MCQ", domain:"STI Syndromes", question:"What is the primary symptom of Trichomonas vaginalis infection in women?", options:["Frothy, thin, greenish discharge","Curdy, white discharge","Yellow mucopurulent discharge","No symptoms"], answer:0, explanation:"Trichomoniasis typically causes a profuse, thin, frothy, green‑yellow discharge with a foul odour." },
  { id:29, type:"MCQ", domain:"Syphilis", question:"Which laboratory test is most specific for Treponema pallidum infection?", options:["VDRL","TPHA","TRUST","RPR"], answer:1, explanation:"TPHA (Treponema pallidum haemagglutination assay) is a treponemal test with high specificity, used to confirm syphilis." },
  { id:30, type:"MCQ", domain:"STI Syndromes", question:"A 32-year-old man has urethral discharge and dysuria, but no genital ulcers. What syndromic diagnosis should be assigned?", options:["Urethral discharge syndrome","Genital ulcer syndrome","Scrotal swelling syndrome","Lower abdominal pain syndrome"], answer:0, explanation:"Urethral discharge with dysuria and no ulcers is the classic urethral discharge syndrome." },
  { id:31, type:"MCQ", domain:"STI Syndromes", question:"A man with urethral discharge and dysuria (no ulcers) presents for treatment. What is the recommended empiric therapy?", options:["Ceftriaxone + Doxycycline","Amoxicillin + Metronidazole","Gentamicin + Azithromycin","Ciprofloxacin + Erythromycin"], answer:0, explanation:"Urethral discharge is treated with ceftriaxone (for gonorrhoea) plus doxycycline (for chlamydia)." },
  { id:32, type:"MCQ", domain:"STI Syndromes", question:"Chlamydia trachomatis infection in men can cause which complication?", options:["Orchitis","Candidiasis","Balanitis","Condylomata acuminata"], answer:0, explanation:"Chlamydia can cause epididymo‑orchitis in men as a complication." },
  { id:33, type:"MCQ", domain:"STI Syndromes", question:"What is the commonest cause of genital warts (condylomata acuminata)?", options:["HSV‑2","HPV types 6 and 11","HPV types 16 and 18","Molluscum contagiosum virus"], answer:1, explanation:"HPV types 6 and 11 are responsible for >90% of anogenital warts." },
  { id:34, type:"MCQ", domain:"STI Syndromes", question:"Anal cancer in Jamaica is strongly associated with which infection?", options:["HIV infection","HPV infection","Hepatitis B","Herpes zoster"], answer:1, explanation:"Persistent high‑risk HPV (especially type 16) is the main cause of anal cancer." },
  { id:35, type:"MCQ", domain:"STI Pathogens", question:"Which of the following organisms is NOT primarily transmitted through sexual contact?", options:["Treponema pallidum","Chlamydia trachomatis","Mycobacterium leprae","Trichomonas vaginalis"], answer:2, explanation:"M. leprae (leprosy) is not considered an STI; its transmission is mainly respiratory." },

  { id:37, type:"MCQ", domain:"STI Case Management", question:"What is the main disadvantage of the aetiologic (laboratory‑based) approach to STI management?", options:["Expensive laboratory support is required","It leads to too much overtreatment","It misses asymptomatic cases","It has no public health impact"], answer:0, explanation:"Aetiologic diagnosis requires laboratory infrastructure, which is often unavailable at primary care level and delays treatment." },
  { id:38, type:"MCQ", domain:"STI Syndromes", question:"A pregnant woman with vaginal discharge, pH >4.5, and a fishy odour on the whiff test is most likely to have which condition?", options:["Candidiasis","Bacterial vaginosis","Trichomoniasis","Gonococcal cervicitis"], answer:1, explanation:"Elevated pH and positive whiff test are typical of bacterial vaginosis." },
  { id:39, type:"MCQ", domain:"STI Syndromes", question:"Which diagnostic test is most likely to detect Candida albicans infection?", options:["Wet mount (saline)","Gram stain","KOH preparation showing pseudohyphae","Culture for N. gonorrhoeae"], answer:2, explanation:"10% KOH preparation lyses cells and makes fungal elements (pseudohyphae, budding yeast) more visible." },
  { id:40, type:"MCQ", domain:"STI Syndromes", question:"What is the first‑line treatment for candidiasis in the syndromic protocol?", options:["Metronidazole 2 g orally single dose","Clotrimazole vaginal pessary 100 mg inserted nightly for 6 nights","Ceftriaxone 250 mg IM stat","Acyclovir 400 mg three times daily"], answer:1, explanation:"Clotrimazole pessaries are standard topical treatment for candidiasis; fluconazole is an alternative." },
  { id:41, type:"MCQ", domain:"STI Syndromes", question:"The risk of neonatal conjunctivitis (ophthalmia neonatorum) is greatest if the mother has which infection?", options:["Trichomonas","Chlamydia or gonorrhoea","Bacterial vaginosis","Candidiasis"], answer:1, explanation:"Neisseria gonorrhoeae and Chlamydia trachomatis are the primary causes of ophthalmia neonatorum." },
  { id:42, type:"MCQ", domain:"STI Prevention", question:"Which of the following STIs can be prevented by vaccination?", options:["Hepatitis B and HPV","Syphilis and HPV","Gonorrhoea and HPV","Trichomoniasis and Hepatitis C"], answer:0, explanation:"Effective vaccines exist for Hepatitis B and for HPV (preventing types 6,11,16,18)." },
  { id:43, type:"MCQ", domain:"Syphilis", question:"What is the typical incubation period for primary syphilis?", options:["3‑5 days","7‑10 days","10‑90 days",">90 days"], answer:2, explanation:"Syphilis incubation ranges from 10 to 90 days (average 21 days)." },
  { id:44, type:"MCQ", domain:"STI Prevention", question:"What is the most effective method of preventing STI transmission?", options:["Antibiotic prophylaxis","Abstinence or consistent condom use","Vaginal douching","Oral contraceptives"], answer:1, explanation:"Abstinence or correct, consistent condom use are highly effective in preventing STI transmission." },
  { id:45, type:"MCQ", domain:"STI Case Management", question:"What is the first step in effective case management of an STI patient?", options:["Laboratory testing","History and risk assessment","Treatment of the partner","Reporting to MOHW"], answer:1, explanation:"A thorough history and risk assessment guide syndromic diagnosis and management." },
  { id:46, type:"MCQ", domain:"HIV", question:"In Jamaica's national HIV testing algorithm, which test is used as the first rapid screening test?", options:["Uni‑Gold HIV‑1/2","Determine HIV‑1/2 Ag/Ab Combo","Western Blot","ELISA"], answer:1, explanation:"The Determine HIV‑1/2 Ag/Ab Combo is used as the initial screening test." },
  { id:47, type:"MCQ", domain:"HIV", question:"If the Determine HIV test is reactive, what is the next step in the Jamaican algorithm?", options:["PCR test","Uni‑Gold HIV rapid test","ELISA screening","Western Blot"], answer:1, explanation:"A second rapid test (Uni‑Gold) is used to confirm a reactive Determine result." },
  { id:48, type:"MCQ", domain:"HIV", question:"If the Determine HIV test is non‑reactive (negative), which of the following is correct according to the Jamaican algorithm?", options:["Run Uni‑Gold to confirm","Report as HIV negative – no further testing needed","Send for Western Blot","Repeat Determine in 2 weeks"], answer:1, explanation:"If Determine is negative, the algorithm stops and the result is reported as HIV negative. Uni‑Gold is only run if Determine is reactive." },

  { id:51, type:"MCQ", domain:"HIV", question:"To which class of antiretroviral drugs does dolutegravir belong?", options:["Protease inhibitors","Integrase strand transfer inhibitors","Nucleoside reverse transcriptase inhibitors","Non‑nucleoside reverse transcriptase inhibitors"], answer:1, explanation:"Dolutegravir is an integrase inhibitor." },

  { id:53, type:"MCQ", domain:"HIV", question:"Which antiretroviral drug may cause hepatotoxicity, especially in women with CD4 counts >250 cells/mm³?", options:["Efavirenz","Nevirapine","Lamivudine","Tenofovir"], answer:1, explanation:"Nevirapine carries a risk of severe hepatotoxicity, particularly in women with high CD4 counts." },

  { id:56, type:"MCQ", domain:"HIV", question:"A pregnant woman tests HIV positive at 14 weeks. Under the Option B+ approach, what is the correct action?", options:["Start ART immediately and continue for life","Delay ART until the third trimester","Give ART only during pregnancy and stop after delivery","Treat only the infant after birth"], answer:0, explanation:"Option B+ initiates lifelong ART for all HIV‑positive pregnant and breastfeeding women regardless of CD4 count." },

// Shuffle questions for random order
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let questions = shuffleArray([...QUESTION_SET]);
let currentIndex = 0;
let userAnswers = new Array(questions.length).fill(null);
let score = 0;
let answeredCount = 0;

const dynamicDiv = document.getElementById('dynamicContent');
const correctSpan = document.getElementById('correctCount');
const answeredSpan = document.getElementById('answeredCount');
const totalSpan = document.getElementById('totalQuestions');
const progressFill = document.getElementById('progressFill');
const progressPercentSpan = document.getElementById('progressPercent');

totalSpan.innerText = questions.length;
let speechSynth = window.speechSynthesis;

function updateStats() {
  correctSpan.innerText = score;
  answeredSpan.innerText = answeredCount;
  let percent = (answeredCount / questions.length) * 100;
  progressFill.style.width = `${percent}%`;
  progressPercentSpan.innerText = `${Math.round(percent)}% completed`;
}

function speakText(text) {
  if (speechSynth.speaking) speechSynth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  const rate = parseFloat(document.getElementById('voiceRate')?.value || 1);
  utterance.rate = rate;
  utterance.lang = 'en-US';
  speechSynth.speak(utterance);
}

function handleAnswer(selectedIdx) {
  if (userAnswers[currentIndex] !== null) return;
  const q = questions[currentIndex];
  const isCorrect = (selectedIdx === q.answer);
  if (isCorrect) score++;
  answeredCount++;
  userAnswers[currentIndex] = selectedIdx;
  updateStats();
  renderCurrentQuestion();
}

function nextQuestion() {
  if (userAnswers[currentIndex] === null) return;
  currentIndex++;
  renderCurrentQuestion();
}

function resetExam() {
  questions = shuffleArray([...QUESTION_SET]);
  userAnswers = new Array(questions.length).fill(null);
  currentIndex = 0;
  score = 0;
  answeredCount = 0;
  updateStats();
  renderCurrentQuestion();
  if (speechSynth.speaking) speechSynth.cancel();
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderCurrentQuestion() {
  if (currentIndex >= questions.length) {
    dynamicDiv.innerHTML = `
      <div class="finish-card">
        <h2>🏆 Practice session completed! 🏆</h2>
        <p style="font-size:1.6rem; margin:20px 0;">Your score: ${score} / ${questions.length}</p>
        <p>${Math.round(score/questions.length*100)}% correct</p>
        <button class="restart" onclick="resetExam()">🔄 Start over</button>
      </div>
    `;
    return;
  }

  const q = questions[currentIndex];
  const isAnswered = userAnswers[currentIndex] !== null;
  const userChoice = userAnswers[currentIndex];

  let optionsHtml = '';
  if (q.type === 'MCQ') {
    optionsHtml = q.options.map((opt, idx) => {
      let additionalClass = '';
      if (isAnswered) {
        if (idx === q.answer) additionalClass = 'correct';
        else if (idx === userChoice && idx !== q.answer) additionalClass = 'wrong';
      }
      return `<div class="option ${additionalClass}" data-opt-index="${idx}">
                <span class="prefix">${String.fromCharCode(65+idx)}</span>
                <span>${escapeHtml(opt)}</span>
              </div>`;
    }).join('');
  } else {
    // True/False – use the statement field
    const tfOptions = ['True', 'False'];
    optionsHtml = tfOptions.map((opt, idx) => {
      let additionalClass = '';
      if (isAnswered) {
        const correctIdx = q.answer ? 0 : 1;
        if (idx === correctIdx) additionalClass = 'correct';
        else if (idx === userChoice && idx !== correctIdx) additionalClass = 'wrong';
      }
      return `<div class="option ${additionalClass}" data-opt-index="${idx}">
                <span class="prefix">${idx===0?'T':'F'}</span>
                <span>${opt}</span>
              </div>`;
    }).join('');
  }

  let explanationHtml = '';
  if (isAnswered) {
    explanationHtml = `<div class="explanation-box">💡 <strong>Explanation:</strong> ${escapeHtml(q.explanation)}</div>`;
  }

  const nextDisabled = !isAnswered;

  // For TF questions, display the statement properly
  const questionText = q.type === 'TF' ? q.statement : q.question;

  dynamicDiv.innerHTML = `
    <div class="question-panel">
      <div class="question-text">
        <span style="background:#eef2fa; padding:2px 12px; border-radius:40px; font-size:0.8rem; margin-right:12px;">Q${currentIndex+1}/${questions.length}</span>
        ${escapeHtml(questionText)}
        <button class="btn-secondary" style="margin-left:15px; background:#4b6f86; padding:6px 12px;" onclick="speakText('${escapeHtml(questionText)}')">🔊 Read aloud</button>
      </div>
      <div class="options-area" id="optionsArea">
        ${optionsHtml}
      </div>
      ${explanationHtml}
    </div>
    <div class="action-bar">
      <div class="voice-control">
        <label>🔊 Speed</label>
        <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1">
        <span id="rateValue">1.0x</span>
      </div>
      <div>
        <button class="restart" onclick="resetExam()">⟳ Restart</button>
        <button id="nextBtn" class="next-btn" ${nextDisabled ? 'disabled style="opacity:0.5;"' : ''}>➡ Next question</button>
      </div>
    </div>
  `;

  if (!nextDisabled) {
    document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  }
  if (!isAnswered) {
    document.querySelectorAll('.option').forEach(optDiv => {
      optDiv.addEventListener('click', (e) => {
        const selected = parseInt(optDiv.dataset.optIndex);
        handleAnswer(selected);
      });
    });
  }
  const rateSlider = document.getElementById('voiceRate');
  if (rateSlider) {
    rateSlider.addEventListener('input', (e) => {
      document.getElementById('rateValue').innerText = e.target.value + 'x';
    });
  }
}

window.speakText = speakText;
window.resetExam = resetExam;
window.nextQuestion = nextQuestion;

updateStats();
renderCurrentQuestion();
</script>
