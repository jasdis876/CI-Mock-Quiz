    .next-btn { background: #2b7a62; padding: 12px 32px; font-size: 1rem; }
    .voice-control {
      display: flex;

      gap: 12px;
      background: #eef2f8;
      padding: 5px 20px;
      border-radius: 60px;
    }

      text-align: center;
      font-size: 0.7rem;
      padding: 16px;
      color: #7a8b9b;

    h2 { color: #1f5e4a; margin-bottom: 1rem; }
    @media (max-width: 600px) {

      .action-bar { flex-direction: column; align-items: stretch; }

<script>
// ============================================================
// 100 STI-FOCUSED QUESTIONS extracted from the mock exam

const QUESTION_SET = [
  { id:"Q1", type:"MCQ", domain:"STI Syndromes", question:"A 25-year-old woman presents with a thin, homogeneous, fishy-odoured vaginal discharge that adheres to the vaginal walls. The most likely diagnosis is:", options:["Candidiasis","Bacterial vaginosis","Trichomoniasis","Chlamydial cervicitis"], answer:1, explanation:"Thin, homogeneous, fishy discharge with positive whiff test is characteristic of bacterial vaginosis." },
  { id:"Q2", type:"MCQ", domain:"STI Syndromes", question:"Which of the following is NOT an advantage of syndromic management of STIs?", options:["Immediate treatment without laboratory delay","Simplified flow of patient care","Identification of asymptomatic infections","Reduction of disease transmission"], answer:2, explanation:"Syndromic management does NOT identify asymptomatic infections – that is a limitation." },
  { id:"Q3", type:"MCQ", domain:"STI Syndromes", question:"According to Jamaican STI syndromic guidelines, which combination is first‑line for urethral discharge?", options:["Ciprofloxacin + Azithromycin","Ceftriaxone + Doxycycline","Gentamicin + Erythromycin","Amoxicillin + Metronidazole"], answer:1, explanation:"Ceftriaxone 1g IM + Doxycycline 100mg BD for 7 days." },
  { id:"Q4", type:"MCQ", domain:"STI Syndromes", question:"The most important step in managing a patient with genital ulcers is:", options:["Apply topical antibiotics only","Identify and treat sexual partners","Delay treatment until laboratory confirmation","Prescribe antifungal therapy"], answer:1, explanation:"Partner notification and treatment break transmission and prevent reinfection." },
  { id:"Q5", type:"MCQ", domain:"Syphilis", question:"A 28-year-old man presents with a painless, indurated ulcer on the penis and non‑tender inguinal nodes. Most likely diagnosis?", options:["Chancroid","Primary syphilis","Genital herpes","Granuloma inguinale"], answer:1, explanation:"Painless indurated chancre is classic for primary syphilis." },
  { id:"Q6", type:"MCQ", domain:"HIV", question:"In the Jamaican HIV testing algorithm, which test is used as the initial screening rapid test?", options:["Uni‑Gold","Determine HIV‑1/2 Ag/Ab Combo","Western Blot","ELISA"], answer:1, explanation:"Determine Combo is the first test; reactive results are confirmed with Uni‑Gold." },
  { id:"Q7", type:"MCQ", domain:"HIV", question:"First‑line ART regimen for adults in Jamaica (2025) is:", options:["Zidovudine + Nevirapine + Efavirenz","Tenofovir + Lamivudine + Dolutegravir","Abacavir + Lamivudine + Atazanavir","Tenofovir + Emtricitabine + Lopinavir"], answer:1, explanation:"TDF/3TC/DTG is the preferred first‑line regimen." },
  { id:"Q8", type:"MCQ", domain:"Hepatitis B", question:"Which serological pattern indicates a chronic Hepatitis B carrier?", options:["HBsAg +, anti-HBc +, anti-HBs –","HBsAg –, anti-HBs +, anti-HBc +","HBsAg –, anti-HBs +, anti-HBc –","HBsAg +, anti-HBc –, anti-HBs –"], answer:0, explanation:"HBsAg positive for >6 months with anti-HBc and no anti-HBs = chronic carrier." },
  { id:"Q9", type:"TF", domain:"HIV", statement:"People with an undetectable viral load cannot transmit HIV sexually.", answer:true, explanation:"U=U is scientifically proven." },
  { id:"Q10", type:"MCQ", domain:"STI Syndromes", question:"Pelvic inflammatory disease (PID) is most often a complication of:", options:["Untreated gonorrhoea or chlamydia","Trichomoniasis","Candidiasis","Bacterial vaginosis alone"], answer:0, explanation:"Ascending infection from N. gonorrhoeae and/or C. trachomatis is the main cause." },
  { id:"Q11", type:"MCQ", domain:"Syphilis", question:"A patient with secondary syphilis typically presents with:", options:["Painless indurated ulcer","Maculopapular rash on palms and soles","Painful ulcers with exudate","Itchy vesicular lesions"], answer:1, explanation:"Secondary syphilis often causes a symmetrical rash involving palms and soles." },
  { id:"Q12", type:"MCQ", domain:"Hepatitis B", question:"A newborn of an HBsAg‑positive mother should receive:", options:["Hepatitis B vaccine only","HBIG only","Both HBIG and vaccine within 24 hours","No intervention"], answer:2, explanation:"HBIG + first vaccine dose within 12–24 hours prevents >90% of chronic infections." },
  { id:"Q13", type:"MCQ", domain:"STI Syndromes", question:"The presence of 'clue cells' on microscopy is diagnostic of:", options:["Gonorrhoea","Bacterial vaginosis","Candidiasis","Trichomoniasis"], answer:1, explanation:"Clue cells = epithelial cells covered with coccobacilli, pathognomonic for BV." },
  { id:"Q14", type:"TF", domain:"Confidentiality", statement:"Contact Investigators may share case details with any healthcare worker who requests them.", answer:false, explanation:"Only authorised personnel with a need to know may access confidential data." },
  { id:"Q15", type:"MCQ", domain:"STI Syndromes", question:"Multiple painful ulcers with tender suppurative inguinal lymph nodes (buboes) suggest:", options:["Syphilis","Chancroid","LGV","Genital herpes"], answer:1, explanation:"Chancroid (H. ducreyi) classically causes painful ulcers and painful suppurative nodes." },
  { id:"Q16", type:"MCQ", domain:"HIV", question:"After an undetectable viral load, the next viral load test should be repeated in:", options:["3 months","6 months","12 months","24 months"], answer:2, explanation:"Yearly monitoring is recommended once suppressed." },
  { id:"Q17", type:"MCQ", domain:"Syphilis", question:"Recommended treatment for late latent syphilis (>1 year) is:", options:["BPG 2.4 MU IM single dose","BPG 2.4 MU IM weekly for 3 weeks","Doxycycline 7 days","Azithromycin single dose"], answer:1, explanation:"Late latent requires three weekly doses of BPG." },
  { id:"Q18", type:"TF", domain:"STI Prevention", statement:"The HPV vaccine prevents both genital warts and cervical cancer.", answer:true, explanation:"Quadrivalent vaccine (6,11,16,18) protects against warts and high‑risk types." },
  { id:"Q19", type:"MCQ", domain:"Contact Investigation", question:"An STI Field Record (FR) is used for:", options:["Interviewing the index case","Investigating contacts and suspects","Monthly summary statistics","Laboratory referral"], answer:1, explanation:"The FR is for contact investigation; the IR is for the index case interview." },
  { id:"Q20", type:"MCQ", domain:"STI Syndromes", question:"A 32-year-old male presents with a vesicular rash on the glans penis that ulcerates and recurs every few months. The most likely diagnosis is:", options:["Genital herpes","Primary syphilis","Chancroid","Granuloma inguinale"], answer:0, explanation:"Recurrent vesicular lesions that ulcerate are typical of genital herpes simplex virus infection." },
  { id:"Q21", type:"MCQ", domain:"STI Syndromes", question:"In the Jamaican syndromic algorithm, the treatment for vaginal discharge syndrome typically includes:", options:["Ceftriaxone + Doxycycline + Metronidazole","Azithromycin + Gentamicin + Clotrimazole","Doxycycline + Metronidazole only","Amoxicillin + Fluconazole"], answer:0, explanation:"The 2026 Handbook recommends Ceftriaxone IM + Doxycycline + Metronidazole for cervico‑vaginal discharge to cover gonorrhoea, chlamydia, and BV/trichomoniasis." },
  { id:"Q22", type:"MCQ", domain:"STI Syndromes", question:"A 25-year-old woman presents with vaginal discharge and pelvic pain. On speculum examination, the cervix bleeds easily on contact. Which organism is most likely responsible?", options:["Candida albicans","Neisseria gonorrhoeae","Trichomonas vaginalis","Gardnerella vaginalis"], answer:1, explanation:"Easy friability (contact bleeding) and mucopurulent cervicitis are commonly caused by gonorrhoea or chlamydia." },
  { id:"Q23", type:"MCQ", domain:"STI Syndromes", question:"A woman treated for vaginal discharge two weeks ago returns with lower abdominal pain, fever, and purulent discharge. The most likely diagnosis is:", options:["Candidiasis","Pelvic inflammatory disease (PID)","Bacterial vaginosis","Urinary tract infection"], answer:1, explanation:"Lower abdominal pain, fever and purulent discharge suggest ascending infection (PID)." },
  { id:"Q24", type:"MCQ", domain:"STI Syndromes", question:"The most serious long‑term complication of PID is:", options:["Cervical erosion","Tubal infertility","Vaginal fistulae","Chronic candidiasis"], answer:1, explanation:"PID causes scarring and adhesions of the fallopian tubes, leading to tubal factor infertility and ectopic pregnancy." },
  { id:"Q25", type:"MCQ", domain:"STI Syndromes", question:"A male client presents with multiple painful ulcers on the glans penis and tender, suppurative inguinal lymph nodes. The most likely causative organism is:", options:["Treponema pallidum","Haemophilus ducreyi","Klebsiella granulomatis","Herpes simplex virus"], answer:1, explanation:"Painful ulcers with painful, suppurative lymph nodes (buboes) are characteristic of chancroid (H. ducreyi)." },
  { id:"Q26", type:"MCQ", domain:"STI Syndromes", question:"In the Jamaican syndromic algorithm, the initial treatment for genital ulcer disease (GUD) includes:", options:["Benzathine penicillin G + Erythromycin","Ceftriaxone + Acyclovir + Azithromycin","Benzathine penicillin G + Ceftriaxone + Acyclovir","Doxycycline + Metronidazole"], answer:2, explanation:"The GUD algorithm in Jamaica treats for syphilis (BPG), chancroid (ceftriaxone or azithromycin) and herpes (acyclovir) pending diagnosis." },
  { id:"Q27", type:"MCQ", domain:"STI Syndromes", question:"A 28-year-old woman reports recurrent thick, white discharge and vulval itching. She is diabetic. The most likely cause is:", options:["Trichomoniasis","Candidiasis","Bacterial vaginosis","Chlamydia"], answer:1, explanation:"Thick, curdy discharge with pruritus, especially in a diabetic, is classic for vulvovaginal candidiasis." },
  { id:"Q28", type:"MCQ", domain:"STI Syndromes", question:"The primary symptom of Trichomonas vaginalis infection in women is:", options:["Frothy, thin, greenish discharge","Curdy, white discharge","Yellow mucopurulent discharge","No symptoms"], answer:0, explanation:"Trichomoniasis typically causes a profuse, thin, frothy, green‑yellow discharge with a foul odour." },
  { id:"Q29", type:"MCQ", domain:"Syphilis", question:"Which test is most specific for Treponema pallidum infection?", options:["VDRL","TPHA","TRUST","RPR"], answer:1, explanation:"TPHA (Treponema pallidum haemagglutination assay) is a treponemal test with high specificity, used to confirm syphilis." },
  { id:"Q30", type:"MCQ", domain:"STI Syndromes", question:"A 32-year-old man presents with urethral discharge, dysuria, and no genital ulcers. Which syndrome best describes his condition?", options:["Urethral discharge syndrome","Genital ulcer syndrome","Scrotal swelling syndrome","Lower abdominal pain syndrome"], answer:0, explanation:"Urethral discharge with dysuria and no ulcers is the classic urethral discharge syndrome." },
  { id:"Q31", type:"MCQ", domain:"STI Syndromes", question:"The correct empiric therapy for the patient in question 30 is:", options:["Ceftriaxone + Doxycycline","Amoxicillin + Metronidazole","Gentamicin + Azithromycin","Ciprofloxacin + Erythromycin"], answer:0, explanation:"Urethral discharge is treated with ceftriaxone (for gonorrhoea) plus doxycycline (for chlamydia)." },
  { id:"Q32", type:"MCQ", domain:"STI Syndromes", question:"Chlamydia trachomatis infection in men can cause:", options:["Orchitis","Candidiasis","Balanitis","Condylomata acuminata"], answer:0, explanation:"Chlamydia can cause epididymo‑orchitis in men as a complication." },
  { id:"Q33", type:"MCQ", domain:"STI Syndromes", question:"The commonest cause of genital warts (condylomata acuminata) is:", options:["HSV‑2","HPV types 6 and 11","HPV types 16 and 18","Molluscum contagiosum virus"], answer:1, explanation:"HPV types 6 and 11 are responsible for >90% of anogenital warts." },
  { id:"Q34", type:"MCQ", domain:"STI Syndromes", question:"Anal cancer in Jamaica is strongly associated with:", options:["HIV infection","HPV infection","Hepatitis B","Herpes zoster"], answer:1, explanation:"Persistent high‑risk HPV (especially type 16) is the main cause of anal cancer." },
  { id:"Q35", type:"MCQ", domain:"STI Pathogens", question:"Which of the following organisms is NOT primarily transmitted through sexual contact?", options:["Treponema pallidum","Chlamydia trachomatis","Mycobacterium leprae","Trichomonas vaginalis"], answer:2, explanation:"M. leprae (leprosy) is not considered an STI; its transmission is mainly respiratory." },
  { id:"Q36", type:"MCQ", domain:"STI Case Management", question:"Overtreatment is most likely to occur with which STI management approach?", options:["Syndromic management","Aetiologic (laboratory‑based) management","Public health screening","Partner notification alone"], answer:0, explanation:"Syndromic management treats all possible organisms for that syndrome, so overtreatment is inherent but acceptable in high‑prevalence settings." },
  { id:"Q37", type:"MCQ", domain:"STI Case Management", question:"The main disadvantage of the aetiologic approach to STI management is:", options:["Expensive laboratory support is required","It leads to too much overtreatment","It misses asymptomatic cases","It has no public health impact"], answer:0, explanation:"Aetiologic diagnosis requires laboratory infrastructure, which is often unavailable at primary care level and delays treatment." },
  { id:"Q38", type:"MCQ", domain:"STI Syndromes", question:"A pregnant woman with vaginal discharge, pH >4.5, and a fishy odour on the whiff test is most likely to have:", options:["Candidiasis","Bacterial vaginosis","Trichomoniasis","Gonococcal cervicitis"], answer:1, explanation:"Elevated pH and positive whiff test are typical of bacterial vaginosis." },
  { id:"Q39", type:"MCQ", domain:"STI Syndromes", question:"The diagnostic test most likely to detect Candida albicans infection is:", options:["Wet mount (saline)","Gram stain","KOH preparation showing pseudohyphae","Culture for N. gonorrhoeae"], answer:2, explanation:"10% KOH preparation lyses cells and makes fungal elements (pseudohyphae, budding yeast) more visible." },
  { id:"Q40", type:"MCQ", domain:"STI Syndromes", question:"The first‑line treatment for candidiasis in the syndromic protocol is:", options:["Metronidazole 2 g orally single dose","Clotrimazole vaginal pessary 100 mg inserted nightly for 6 nights","Ceftriaxone 250 mg IM stat","Acyclovir 400 mg three times daily"], answer:1, explanation:"Clotrimazole pessaries are standard topical treatment for candidiasis; fluconazole is an alternative." },
  { id:"Q41", type:"MCQ", domain:"STI Syndromes", question:"The risk of neonatal conjunctivitis (ophthalmia neonatorum) is greatest if the mother has:", options:["Trichomonas infection","Chlamydia or gonorrhoea","Bacterial vaginosis","Candidiasis"], answer:1, explanation:"Neisseria gonorrhoeae and Chlamydia trachomatis are the primary causes of ophthalmia neonatorum." },
  { id:"Q42", type:"MCQ", domain:"STI Prevention", question:"Which of the following STIs can be prevented by vaccination?", options:["Hepatitis B and HPV","Syphilis and HPV","Gonorrhoea and HPV","Trichomoniasis and Hepatitis C"], answer:0, explanation:"Effective vaccines exist for Hepatitis B and for HPV (preventing types 6,11,16,18)." },
  { id:"Q43", type:"MCQ", domain:"Syphilis", question:"The incubation period for primary syphilis is approximately:", options:["3‑5 days","7‑10 days","10‑90 days",">90 days"], answer:2, explanation:"Syphilis incubation ranges from 10 to 90 days (average 21 days)." },
  { id:"Q44", type:"MCQ", domain:"STI Prevention", question:"The most effective method of preventing STI transmission is:", options:["Antibiotic prophylaxis","Abstinence or consistent condom use","Vaginal douching","Oral contraceptives"], answer:1, explanation:"Abstinence or correct, consistent condom use are highly effective in preventing STI transmission." },
  { id:"Q45", type:"MCQ", domain:"STI Case Management", question:"The first step in effective case management of an STI patient is:", options:["Laboratory testing","History and risk assessment","Treatment of the partner","Reporting to MOHW"], answer:1, explanation:"A thorough history and risk assessment guide syndromic diagnosis and management." },
  { id:"Q46", type:"MCQ", domain:"HIV", question:"The first HIV rapid test performed in Jamaica's national algorithm is:", options:["Uni‑Gold HIV‑1/2","Determine HIV‑1/2 Ag/Ab Combo","Western Blot","ELISA"], answer:1, explanation:"The Determine HIV‑1/2 Ag/Ab Combo is used as the initial screening test in the Jamaican algorithm." },
  { id:"Q47", type:"MCQ", domain:"HIV", question:"A reactive Determine HIV test should next be confirmed using:", options:["PCR test","Uni‑Gold HIV rapid test","ELISA screening","Western Blot"], answer:1, explanation:"A second rapid test (Uni‑Gold) is used to confirm a reactive Determine result." },
  { id:"Q48", type:"MCQ", domain:"HIV", question:"If the first HIV test is negative and the second test (Uni‑Gold) is positive, the overall result is:", options:["Confirmed positive","Confirmed negative","Discordant – send to reference laboratory","Indeterminate – repeat in six months"], answer:2, explanation:"Discordant rapid test results require resolution by a tie‑breaker test (e.g., HIV Colloidal Gold) or sending the sample to the reference lab." },
  { id:"Q49", type:"MCQ", domain:"Contact Investigation", question:"The role of the Contact Investigator after an HIV positive result includes all of the following EXCEPT:", options:["Partner notification and risk reduction counselling","Linkage to care and treatment site","Prescribing antiretroviral therapy","Home visit for re‑engagement if the client defaults"], answer:2, explanation:"Prescribing ART is the role of a physician, not a Contact Investigator." },
  { id:"Q50", type:"MCQ", domain:"HIV", question:"Which drug combination represents first‑line antiretroviral therapy in Jamaica (2025 guidelines)?", options:["Zidovudine + Nevirapine + Efavirenz","Tenofovir + Lamivudine + Dolutegravir","Abacavir + Lamivudine + Atazanavir","Tenofovir + Emtricitabine + Lopinavir"], answer:1, explanation:"TDF/3TC/DTG is the preferred first‑line regimen." },
  { id:"Q51", type:"MCQ", domain:"HIV", question:"Dolutegravir belongs to which class of antiretroviral drugs?", options:["Protease inhibitors","Integrase strand transfer inhibitors","Nucleoside reverse transcriptase inhibitors","Non‑nucleoside reverse transcriptase inhibitors"], answer:1, explanation:"Dolutegravir is an integrase inhibitor." },
  { id:"Q52", type:"MCQ", domain:"HIV", question:"Zidovudine (AZT) should be used with caution in patients with:", options:["Renal failure","Severe anaemia","Hepatitis B infection","Pregnancy"], answer:1, explanation:"Zidovudine can cause bone marrow suppression, especially anaemia and neutropenia." },
  { id:"Q53", type:"MCQ", domain:"HIV", question:"Which antiretroviral drug may cause hepatotoxicity, especially in women with CD4 counts >250 cells/mm³?", options:["Efavirenz","Nevirapine","Lamivudine","Tenofovir"], answer:1, explanation:"Nevirapine carries a risk of severe hepatotoxicity, particularly in women with high CD4 counts." },
  { id:"Q54", type:"MCQ", domain:"HIV", question:"The principal goal of antiretroviral therapy is to:", options:["Suppress viral load and restore immune function","Eliminate the virus entirely","Prevent resistance by rotating drugs monthly","Treat only symptomatic patients"], answer:0, explanation:"ART aims to achieve and maintain viral suppression, allowing immune recovery and preventing transmission." },
  { id:"Q55", type:"MCQ", domain:"HIV", question:"After viral load becomes undetectable on ART, the next viral load test should be repeated in:", options:["3 months","6 months","12 months","24 months"], answer:2, explanation:"Once suppressed, viral load is monitored every 12 months unless clinically indicated otherwise." },
  { id:"Q56", type:"MCQ", domain:"HIV", question:"A pregnant woman tests HIV positive at 14 weeks gestation. Under the Option B+ approach, the correct action is to:", options:["Start ART immediately and continue for life","Delay ART until the third trimester","Give ART only during pregnancy and stop after delivery","Treat only the infant after birth"], answer:0, explanation:"Option B+ initiates lifelong ART for all HIV‑positive pregnant and breastfeeding women regardless of CD4 count." },
  { id:"Q57", type:"MCQ", domain:"HIV", question:"An example of primary prevention of mother‑to‑child transmission of HIV is:", options:["Early ART for infected mothers","HIV testing for all pregnant women and their partners","Exclusive breastfeeding for 12 months","Elective caesarean section for all"], answer:1, explanation:"Primary prevention includes preventing HIV acquisition in the mother (e.g., partner testing and condoms). Secondary prevention includes ART to prevent MTCT." },
  { id:"Q58", type:"MCQ", domain:"HIV", question:"Infants born to HIV positive mothers should be tested for HIV using:", options:["ELISA test at birth","PCR test at 6 weeks of age","Western Blot at 3 months","Rapid test at 1 month"], answer:1, explanation:"HIV DNA PCR is used for early infant diagnosis at 6 weeks or as soon as possible thereafter." },
  { id:"Q59", type:"MCQ", domain:"HIV", question:"The window period for HIV refers to:", options:["Time between infection and antibody detection","Time between ART start and viral suppression","Duration of incubation for AIDS","Time HIV survives outside the body"], answer:0, explanation:"The window period is the time after infection before antibodies reach detectable levels, usually 4‑12 weeks." },
  { id:"Q60", type:"MCQ", domain:"Confidentiality", question:"A Contact Investigator suspects a client may suffer social harm if their HIV status is disclosed. He should:", options:["Proceed and notify all partners immediately","Delay notification until a plan for safe disclosure is developed","Avoid counselling","Inform the media for public safety"], answer:1, explanation:"When IPV or social harm is a concern, partner notification should be deferred until a safety plan is in place." },
  { id:"Q61", type:"MCQ", domain:"HIV", question:"Which HIV drug is chemically similar to lamivudine and also active against Hepatitis B?", options:["Emtricitabine","Abacavir","Tenofovir alafenamide","Zidovudine"], answer:0, explanation:"Emtricitabine (FTC) is a cytidine analogue similar to lamivudine (3TC) and is active against both HIV and HBV." },
  { id:"Q62", type:"MCQ", domain:"HIV", question:"Post‑exposure prophylaxis (PEP) for occupational HIV exposure should ideally be started within:", options:["1 hour (ideally within 2 hours)","24 hours","48 hours","7 days"], answer:0, explanation:"PEP should be initiated as soon as possible, preferably within 2 hours, and certainly within 72 hours after exposure." },
  { id:"Q63", type:"MCQ", domain:"Hepatitis B", question:"Health care workers should be screened for Hepatitis B because:", options:["They are at risk of occupational exposure","Vaccination is contraindicated in them","They cannot transmit infection to patients","It is a non‑communicable disease"], answer:0, explanation:"Healthcare workers have an increased risk of occupational exposure to bloodborne pathogens, including HBV." },
  { id:"Q64", type:"MCQ", domain:"Hepatitis B", question:"The correct Hepatitis B vaccine schedule for infants is:", options:["0, 3, 6 months","0, 1, 6 months","0, 6, 12 months","1, 3, 5 months"], answer:1, explanation:"The standard schedule for hepatitis B vaccine is at birth, 1 month, and 6 months." },
  { id:"Q65", type:"MCQ", domain:"Hepatitis B", question:"A person with HBsAg positive and anti‑HBs negative is classified as:", options:["Immune due to vaccination","Susceptible","Chronic carrier","Acute infection"], answer:2, explanation:"HBsAg positive for >6 months with negative anti-HBs indicates chronic HBV infection (carrier state)." },
  { id:"Q66", type:"MCQ", domain:"Hepatitis B", question:"The main mode of Hepatitis B transmission in Jamaica is:", options:["Faeco‑oral","Sexual and bloodborne","Mosquito bite","Contaminated water"], answer:1, explanation:"HBV is transmitted through unprotected sexual intercourse, sharing needles, and from mother to child." },
  { id:"Q67", type:"MCQ", domain:"Hepatitis B", question:"The presence of anti‑HBs antibody alone (without HBsAg or anti‑HBc) indicates:", options:["Immunity from vaccination or past infection","Acute infection","Chronic infection","Window phase"], answer:0, explanation:"Anti‑HBs alone is seen after successful vaccination or recovery from past infection (if anti‑HBc is negative, it is vaccine‑induced immunity)." },
  { id:"Q68", type:"MCQ", domain:"Hepatitis B", question:"Which of the following is NOT a complication of chronic Hepatitis B infection?", options:["Cirrhosis","Hepatocellular carcinoma","Cholecystitis","Chronic liver disease"], answer:2, explanation:"Cholecystitis (gallbladder inflammation) is not directly caused by HBV; it is typically due to gallstones." },
  { id:"Q69", type:"MCQ", domain:"Hepatitis B", question:"Which serological marker is used to differentiate acute from chronic Hepatitis B infection?", options:["Anti‑HBc IgM","Anti‑HBs","HBsAg","HBV DNA"], answer:0, explanation:"IgM anti‑HBc is present in acute infection and disappears in chronic infection." },
  { id:"Q70", type:"MCQ", domain:"Contact Investigation", question:"The Contact Investigator's role in Hepatitis B control includes:", options:["Counselling HBsAg positive clients and referring contacts for testing and vaccination","Prescribing antivirals","Performing liver biopsy","Conducting serology in the field"], answer:0, explanation:"CI responsibilities include education, counselling, and partner notification for hepatitis B." },
  { id:"Q71", type:"MCQ", domain:"Hepatitis B", question:"Babies born to HBsAg positive mothers should receive:", options:["Hepatitis B vaccine and HBIG within 24 hours","HBIG only after 7 days","Vaccine alone at 6 weeks","No treatment if the mother is asymptomatic"], answer:0, explanation:"HBIG plus the first dose of hepatitis B vaccine within 12‑24 hours of birth is standard." },
  { id:"Q72", type:"MCQ", domain:"Hepatitis", question:"Which Hepatitis virus is transmitted mainly by the faeco‑oral route?", options:["Hepatitis A","Hepatitis B","Hepatitis C","Hepatitis D"], answer:0, explanation:"HAV is spread through ingestion of contaminated food or water (faecal‑oral)." },
  { id:"Q73", type:"MCQ", domain:"HIV", question:"Which of the following best defines viral load in HIV management?", options:["CD4 cell count per ml of blood","Amount of HIV RNA copies per ml of blood","Number of antibodies against HIV","Duration since infection"], answer:1, explanation:"Viral load quantifies HIV RNA copies/mL and is the best marker of treatment response." },
  { id:"Q74", type:"MCQ", domain:"HIV", question:"An HIV positive client on ART develops jaundice after starting Nevirapine. The most likely cause is:", options:["Drug‑induced hepatitis","Immune reconstitution syndrome","Acute Hepatitis C","Opportunistic infection"], answer:0, explanation:"Nevirapine can cause severe hepatotoxicity, especially in women with high CD4 counts." },
  { id:"Q75", type:"MCQ", domain:"HIV", question:"The term U=U means:", options:["Unaware = Unsafe","Undetectable = Untransmittable","Untreated = Unlikely","Unrecorded = Unconfirmed"], answer:1, explanation:"People with an undetectable viral load cannot transmit HIV sexually (U=U)." },
  { id:"Q76", type:"MCQ", domain:"Contact Investigation", question:"The Contact Investigator's first step when a PLHIV defaults from care for 3 months is to:", options:["Call or visit to encourage return to clinic","Remove them from the register","Report to the parish manager only","Start legal action"], answer:0, explanation:"CIs are responsible for re‑engaging defaulters through field visits or phone calls." },
  { id:"Q77", type:"MCQ", domain:"Contact Investigation", question:"A Contact Investigator must maintain records of PLHIV follow‑up visits on the:", options:["Contact Investigation Register","Hospital admission log","Pharmacy dispensing sheet","Staff roster"], answer:0, explanation:"The Contact Investigation Register is the official record of all activities related to case and contact follow‑up." },
  { id:"Q78", type:"MCQ", domain:"HIV", question:"HIV infection in a monogamous man who receives frequent transfusions for haemophilia is most likely due to:", options:["Sexual contact with his wife","Contaminated blood products","Needle‑stick injury at work","Mosquito bites"], answer:1, explanation:"Before blood screening, haemophiliacs were at high risk from contaminated clotting factor concentrates." },
  { id:"Q79", type:"MCQ", domain:"HIV", question:"A discordant couple is defined as:", options:["Both partners HIV positive","One partner HIV positive, the other negative","Both HIV negative","Partners of different ages"], answer:1, explanation:"Discordant means one partner is HIV infected and the other is not." },
  { id:"Q80", type:"MCQ", domain:"HIV", question:"The main method of preventing HIV infection in a discordant couple is:", options:["Condom use and ART for the positive partner","Abstinence only","Male circumcision alone","Using different beds"], answer:0, explanation:"ART (to achieve viral suppression) plus consistent condom use is highly effective in preventing transmission." },
  { id:"Q81", type:"MCQ", domain:"Confidentiality", question:"A Contact Investigator who shares a client's HIV status with a friend has breached:", options:["Professional integrity and confidentiality","Counselling ethics only","Standard precautions","Clinical management protocols"], answer:0, explanation:"Unauthorised disclosure of confidential patient information is a serious breach of ethics and law." },
  { id:"Q82", type:"MCQ", domain:"HIV/HBV", question:"Which antiretroviral combination is active against both HIV and Hepatitis B?", options:["Tenofovir + Lamivudine","Abacavir + Dolutegravir","Zidovudine + Efavirenz","Nevirapine + Lopinavir"], answer:0, explanation:"Tenofovir and lamivudine (or emtricitabine) have dual activity against HIV and HBV." },
  { id:"Q83", type:"MCQ", domain:"HIV", question:"Post‑exposure prophylaxis (PEP) should be continued for:", options:["7 days","14 days","28 days","60 days"], answer:2, explanation:"The standard duration of PEP is 28 days." },
  { id:"Q84", type:"MCQ", domain:"HIV", question:"The most reliable marker of ART success is:", options:["CD4 count increase","Weight gain","Viral load suppression","Absence of opportunistic infections"], answer:2, explanation:"Viral load suppression (<50 copies/mL) is the gold standard for ART efficacy." },
  { id:"Q85", type:"MCQ", domain:"HIV/HBV", question:"Persons with both HIV and Hepatitis B coinfection are at higher risk for:", options:["Renal failure","Severe liver disease and drug toxicity","Lung fibrosis","Skin rashes only"], answer:1, explanation:"HBV progresses faster in HIV‑coinfected individuals, and hepatotoxicity from ART is a greater concern." },
  { id:"Q86", type:"MCQ", domain:"STI Syndromes", question:"A 24-year-old male presents with recurrent painful vesicles on the penis. Which diagnosis is most likely?", options:["Genital herpes","Early latent syphilis","Chlamydia","Bacterial vaginosis"], answer:0, explanation:"Painful recurrent vesicles suggest genital herpes." },
  { id:"Q87", type:"TF", domain:"STI Syndromes", statement:"Genital herpes can be transmitted even when visible lesions are absent.", answer:true, explanation:"Asymptomatic viral shedding may occur." },
  { id:"Q88", type:"MCQ", domain:"STI Syndromes", question:"Which condition is caused by Chlamydia trachomatis serovars L1, L2, and L3?", options:["Lymphogranuloma venereum","Chancroid","Granuloma inguinale","HPV"], answer:0, explanation:"LGV is caused by those serovars." },
  { id:"Q89", type:"MCQ", domain:"STI Syndromes", question:"Which organism causes chancroid?", options:["Haemophilus ducreyi","Treponema pallidum","Candida albicans","HIV"], answer:0, explanation:"Haemophilus ducreyi causes chancroid." },
  { id:"Q90", type:"MCQ", domain:"STI Syndromes", question:"Granuloma inguinale is also known as:", options:["Donovanosis","Candidiasis","Condyloma lata","Ophthalmia neonatorum"], answer:0, explanation:"Granuloma inguinale is also called donovanosis." },
  { id:"Q91", type:"MCQ", domain:"STI Syndromes", question:"Which STI may cause ophthalmia neonatorum?", options:["Gonorrhoea","HPV","Pubic lice","Scabies only"], answer:0, explanation:"Gonococcal infection can cause neonatal eye infection." },
  { id:"Q92", type:"TF", domain:"STI Syndromes", statement:"Ophthalmia neonatorum requires prompt investigation because it may indicate maternal STI infection.", answer:true, explanation:"It suggests maternal gonorrhoea or chlamydia." },
  { id:"Q93", type:"MCQ", domain:"STI Syndromes", question:"A CI receives a report of pre-pubertal gonorrhoea. What additional concern must be considered?", options:["Possible sexual abuse","Hypertension","Diabetes","Asthma"], answer:0, explanation:"STIs in children require careful child protection consideration." },
  { id:"Q94", type:"MCQ", domain:"STI Coding", question:"Which STI code corresponds to post-pubertal gonorrhoea?", options:["A1","B1","C10","C14"], answer:1, explanation:"B1 is the code for post-pubertal gonorrhoea." },
  { id:"Q95", type:"MCQ", domain:"STI Coding", question:"Which STI code corresponds to trichomoniasis?", options:["C6","C7","C10","C15"], answer:0, explanation:"C6 is trichomoniasis." },
  { id:"Q96", type:"MCQ", domain:"STI Coding", question:"Which STI code corresponds to candidiasis?", options:["C6","C7","C13","D2"], answer:1, explanation:"C7 is candidiasis." },
  { id:"Q97", type:"MCQ", domain:"STI Coding", question:"Which STI code corresponds to herpes simplex virus?", options:["C10","C11","C14","B3"], answer:0, explanation:"C10 is herpes simplex virus." },
  { id:"Q98", type:"MCQ", domain:"STI Coding", question:"Which STI code corresponds to HPV/genital warts?", options:["C10","C11","C12","C15"], answer:1, explanation:"C11 is HPV/genital warts." },
  { id:"Q99", type:"TF", domain:"STI Coding", statement:"Mpox is listed among other conditions requiring treatment in the centre in the current STI coding framework.", answer:true, explanation:"Mpox is coded D2." },
  { id:"Q100", type:"MCQ", domain:"STI Syndromes", question:"A 28-year-old male presents with anal discharge after receptive anal intercourse. Which syndrome should be considered?", options:["Anal discharge syndrome","Ophthalmia neonatorum","Candidiasis only","Congenital syphilis"], answer:0, explanation:"Anal discharge syndrome is the appropriate syndromic diagnosis." }
];

// Shuffle questions
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let questions = shuffleArray([...QUESTION_SET]);
let currentIndex = 0;
let userAnswers = new Array(questions.length).fill(null);
let score = 0;
let answeredCount = 0;

const dynamicDiv = document.getElementById('dynamicContent');
const correctSpan = document.getElementById('correctCount');
const answeredSpan = document.getElementById('answeredCount');
const totalSpan = document.getElementById('totalQuestions');
const progressFill = document.getElementById('progressFill');
const progressPercentSpan = document.getElementById('progressPercent');

totalSpan.innerText = questions.length;
let speechSynth = window.speechSynthesis;

function updateStats() {
  correctSpan.innerText = score;
  answeredSpan.innerText = answeredCount;
  let percent = (answeredCount / questions.length) * 100;
  progressFill.style.width = `${percent}%`;
  progressPercentSpan.innerText = `${Math.round(percent)}% completed`;
}

function speakText(text) {
  if (speechSynth.speaking) speechSynth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  const rate = parseFloat(document.getElementById('voiceRate')?.value || 1);
  utterance.rate = rate;
  utterance.lang = 'en-US';
  speechSynth.speak(utterance);
}

function handleAnswer(selectedIdx) {
  if (userAnswers[currentIndex] !== null) return;
  const q = questions[currentIndex];
  const isCorrect = (selectedIdx === q.answer);
  if (isCorrect) score++;
  answeredCount++;
  userAnswers[currentIndex] = selectedIdx;
  updateStats();
  renderCurrentQuestion();
}

function nextQuestion() {
  if (userAnswers[currentIndex] === null) return;
  currentIndex++;
  renderCurrentQuestion();
}

function resetExam() {
  questions = shuffleArray([...QUESTION_SET]);
  userAnswers = new Array(questions.length).fill(null);
  currentIndex = 0;
  score = 0;
  answeredCount = 0;
  updateStats();
  renderCurrentQuestion();
  if (speechSynth.speaking) speechSynth.cancel();
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderCurrentQuestion() {
  if (currentIndex >= questions.length) {
    dynamicDiv.innerHTML = `
      <div class="finish-card">
        <h2>🏆 Practice session completed! 🏆</h2>
        <p style="font-size:1.6rem; margin:20px 0;">Your score: ${score} / ${questions.length}</p>
        <p>${Math.round(score/questions.length*100)}% correct</p>
        <button class="restart" onclick="resetExam()">🔄 Start over</button>
      </div>
    `;
    return;
  }

  const q = questions[currentIndex];
  const isAnswered = userAnswers[currentIndex] !== null;
  const userChoice = userAnswers[currentIndex];

  let optionsHtml = '';
  if (q.type === 'MCQ') {
    optionsHtml = q.options.map((opt, idx) => {
      let additionalClass = '';
      if (isAnswered) {
        if (idx === q.answer) additionalClass = 'correct';
        else if (idx === userChoice && idx !== q.answer) additionalClass = 'wrong';
      }
      return `<div class="option ${additionalClass}" data-opt-index="${idx}">
                <span class="prefix">${String.fromCharCode(65+idx)}</span>
                <span>${escapeHtml(opt)}</span>
              </div>`;
    }).join('');
  } else {
    const tfOptions = ['True', 'False'];
    optionsHtml = tfOptions.map((opt, idx) => {
      let additionalClass = '';
      if (isAnswered) {
        const correctIdx = q.answer ? 0 : 1;
        if (idx === correctIdx) additionalClass = 'correct';
        else if (idx === userChoice && idx !== correctIdx) additionalClass = 'wrong';
      }
      return `<div class="option ${additionalClass}" data-opt-index="${idx}">
                <span class="prefix">${idx===0?'T':'F'}</span>
                <span>${opt}</span>
              </div>`;
    }).join('');
  }

  let explanationHtml = '';
  if (isAnswered) {
    explanationHtml = `<div class="explanation-box">💡 <strong>Explanation:</strong> ${escapeHtml(q.explanation)}</div>`;
  }

  const nextDisabled = !isAnswered;

  dynamicDiv.innerHTML = `
    <div class="question-panel">
      <div class="question-text">
        <span style="background:#eef2fa; padding:2px 12px; border-radius:40px; font-size:0.8rem; margin-right:12px;">Q${currentIndex+1}/${questions.length}</span>
        ${escapeHtml(q.question)}
        <button class="btn-secondary" style="margin-left:15px; background:#4b6f86; padding:6px 12px;" onclick="speakText('${escapeHtml(q.question)} ${q.options ? q.options.join('. ') : ''}')">🔊 Read aloud</button>
      </div>
      <div class="options-area" id="optionsArea">
        ${optionsHtml}
      </div>
      ${explanationHtml}
    </div>
    <div class="action-bar">
      <div class="voice-control">
        <label>🔊 Speed</label>
        <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1">
        <span id="rateValue">1.0x</span>
      </div>
      <div>
        <button class="restart" onclick="resetExam()">⟳ Restart</button>
        <button id="nextBtn" class="next-btn" ${nextDisabled ? 'disabled style="opacity:0.5;"' : ''}>➡ Next question</button>
      </div>
    </div>
  `;

  if (!nextDisabled) {
    document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  }
  if (!isAnswered) {
    document.querySelectorAll('.option').forEach(optDiv => {
      optDiv.addEventListener('click', (e) => {
        const selected = parseInt(optDiv.dataset.optIndex);
        handleAnswer(selected);
      });
    });
  }
  const rateSlider = document.getElementById('voiceRate');
  if (rateSlider) {
    rateSlider.addEventListener('input', (e) => {
      document.getElementById('rateValue').innerText = e.target.value + 'x';
    });
  }
}

window.speakText = speakText;
window.resetExam = resetExam;
window.nextQuestion = nextQuestion;

updateStats();
renderCurrentQuestion();
</script>
